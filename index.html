<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parametric Voice Pattern</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #020b18;
  font-family: 'Space Grotesk', sans-serif;
  color: white;
}

#title-block {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}

#title-block h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.75);
  margin: 0;
}

#mode-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.7);
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.mode-btn, #start-btn {
  background: none;
  border: 2px solid rgba(255,255,255,0.5);
  color: rgba(255,255,255,0.5);
  padding: 8px 16px;
  margin: 0 4px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: 2px;
}

.mode-btn:hover, #start-btn:hover {
  border-color: rgba(255,255,255,0.8);
  color: rgba(255,255,255,0.8);
}

#freq-sidebar {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.freq-fill {
  width: 12px;
  height: 40px;
  border-radius: 4px;
}

#bar-bass    { background:#ff4500; }
#bar-lowmid  { background:#ff8c00; }
#bar-mid     { background:#ffd700; }
#bar-highmid { background:#ffe066; }
#bar-treble  { background:#fff8dc; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="title-block">
  <h1>Parametric Voice Pattern</h1>
  <div id="mode-name">LISSAJOUS</div>
</div>

<div id="controls">
  <button class="mode-btn" data-mode="0">LISSAJOUS</button>
  <button class="mode-btn" data-mode="1">MANDALA</button>
  <button id="start-btn">Activate Mic</button>
</div>

<div id="freq-sidebar">
  <div class="freq-fill" id="bar-bass"></div>
  <div class="freq-fill" id="bar-lowmid"></div>
  <div class="freq-fill" id="bar-mid"></div>
  <div class="freq-fill" id="bar-highmid"></div>
  <div class="freq-fill" id="bar-treble"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
let mode = 0; // 0=Lissajous, 1=Mandala
const modeNames = ['LISSAJOUS','MANDALA'];
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=> {
    mode = parseInt(btn.dataset.mode);
    document.getElementById('mode-name').innerText = modeNames[mode];
  });
});

// Audio setup
let audioCtx, analyser, dataArray, bufferLength, timeData;
let sm = 0.12;
let sRMS=0,sBass=0,sLowMid=0,sMid=0,sHighMid=0,sTreble=0,sCentroid=0,sHue=200;

document.getElementById('start-btn').addEventListener('click',async()=>{
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.75;
  source.connect(analyser);
  bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);
  timeData = new Uint8Array(bufferLength);
  animate();
});

// Frequency helper
function bandEnergy(freqData, sr, low, high){
  let start = Math.floor(low * freqData.length / (sr/2));
  let end = Math.floor(high * freqData.length / (sr/2));
  let sum=0,count=0;
  for(let i=start;i<end;i++){sum+=freqData[i];count++;}
  return count?sum/count/255:0;
}

function hsl(h,s,l,a=1){return `hsla(${h},${s}%,${l}%,${a})`}

// Lissajous points
let LISS_HISTORY = 800;
let lissPoints = [];

function drawLissajous(){
  const t = Date.now()*0.002;
  const px = W/2 + Math.sin(t* (1+sBass*2))*200;
  const py = H/2 + Math.sin(t* (1+sHighMid*1))*200;
  lissPoints.push({x:px,y:py});
  if(lissPoints.length>LISS_HISTORY) lissPoints.shift();
  ctx.beginPath();
  for(let i=0;i<lissPoints.length;i++){
    let p = lissPoints[i];
    ctx.lineTo(p.x,p.y);
  }
  ctx.strokeStyle = hsl(sHue,90,65,0.7);
  ctx.lineWidth = 2+sRMS*4;
  ctx.shadowBlur = 15+sRMS*30;
  ctx.shadowColor = hsl(sHue,100,70);
  ctx.stroke();
  ctx.shadowBlur=0;
}

// Mandala petals
function drawMandala(){
  const rings = 3;
  const basePetals = 3;
  const cx = W/2, cy = H/2;
  const maxR = Math.min(W,H)/4;
  const t = Date.now()*0.002;
  const rotSpeed = 0.01 + sBass*0.05; // rotation reacts to bass
  ctx.save();
  ctx.translate(cx,cy);
  for(let r=0;r<rings;r++){
    let ringR = maxR*(0.4 + r*0.3);
    const petals = Math.round(basePetals + sBass*8);
    for(let p=0;p<petals;p++){
      let angle = (p/petals)*Math.PI*2 + t*rotSpeed*(r+1);
      const bandVal = [sBass,sLowMid,sMid,sHighMid,sTreble][r%5];
      const petalLen = ringR*(0.8 + bandVal*2 + sRMS*1.5); // voice-reactive length
      const petalW   = ringR*(0.08 + sMid*0.2 + sRMS*0.5); // width grows/shrinks with RMS
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(
        petalW*Math.cos(angle+Math.PI/2),
        petalW*Math.sin(angle+Math.PI/2),
        petalW*Math.cos(angle+Math.PI/2),
        petalLen*Math.sin(angle),
        petalLen*Math.cos(angle),
        petalLen*Math.sin(angle)
      );
      ctx.strokeStyle=hsl(sHue,90,65,0.7);
      ctx.lineWidth=2+sRMS*4;
      ctx.shadowBlur=10+sRMS*25;
      ctx.shadowColor=hsl(sHue,100,70);
      ctx.stroke();
      ctx.shadowBlur=0;
    }
  }
  ctx.restore();
}

// Render loop
function animate(){
  requestAnimationFrame(animate);
  if(!analyser) return;
  analyser.getByteFrequencyData(dataArray);
  analyser.getByteTimeDomainData(timeData);
  const sr = audioCtx.sampleRate;

  // Bands
  const bass    = bandEnergy(dataArray,sr,80,250);
  const lowmid  = bandEnergy(dataArray,sr,250,800);
  const mid     = bandEnergy(dataArray,sr,800,2500);
  const highmid = bandEnergy(dataArray,sr,2500,6000);
  const treble  = bandEnergy(dataArray,sr,6000,10000);
  
  // RMS
  let sumSq=0; for(let v of timeData){let x=(v-128)/128; sumSq+=x*x;} 
  let rms = Math.sqrt(sumSq/timeData.length);

  // Smooth
  sRMS = sRMS*(1-sm)+rms*sm*5;
  sBass = sBass*(1-sm)+bass*sm*6;
  sLowMid=sLowMid*(1-sm)+lowmid*sm*3;
  sMid  = sMid*(1-sm)+mid*sm*3;
  sHighMid=sHighMid*(1-sm)+highmid*sm*3;
  sTreble=sTreble*(1-sm)+treble*sm*3;
  sCentroid=(sBass+sLowMid+sMid+sHighMid+sTreble)/5;
  const targetHue = 160 + sBass*100;
  sHue = sHue*0.93+targetHue*0.07;

  // Fade background
  ctx.fillStyle=`rgba(0,0,0,0.12)`;
  ctx.fillRect(0,0,W,H);

  if(mode===0) drawLissajous();
  else if(mode===1) drawMandala();

  // Update frequency bars
  document.getElementById('bar-bass').style.height = (20+sBass*150)+'px';
  document.getElementById('bar-lowmid').style.height = (20+sLowMid*150)+'px';
  document.getElementById('bar-mid').style.height = (20+sMid*150)+'px';
  document.getElementById('bar-highmid').style.height = (20+sHighMid*150)+'px';
  document.getElementById('bar-treble').style.height = (20+sTreble*150)+'px';
}

window.addEventListener('resize',()=>{
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});
</script>
</body>
</html>
