<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Visualizer</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
/* --- Page & Canvas --- */
body {
  margin: 0;
  background: #020b18; /* deep navy for softer trails */
  overflow: hidden;
  font-family: 'Space Grotesk', sans-serif;
}
canvas {
  display: block;
}

/* --- HUD / Title / Buttons --- */
#title-block {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 10;
}
#title-block h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.75); /* brighter title */
  margin: 0;
}
#mode-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: rgba(255,255,255,0.75);
  margin-top: 5px;
}
#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}
.mode-btn {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 6px 12px;
  margin: 0 4px;
  border: 1px solid rgba(255,255,255,0.5);
  background: transparent;
  color: rgba(255,255,255,0.75);
  cursor: pointer;
  border-radius: 4px;
}
.mode-btn.active {
  border-color: #fff;
}

/* --- Frequency Bars (optional) --- */
#freq-sidebar {
  position: absolute;
  left: 10px;
  top: 100px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}
.freq-fill {
  width: 8px;
  height: 40px;
  background: #ff4500; /* warm palette */
  border-radius: 2px;
}
</style>
</head>
<body>

<div id="title-block">
  <h1>VOICE VISUALIZER</h1>
  <div id="mode-name">LISSAJOUS</div>
</div>

<div id="controls">
  <button class="mode-btn active" data-mode="0">LISSAJOUS</button>
  <button class="mode-btn" data-mode="1">MANDALA</button>
  <button id="start-btn">Activate Mic</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// --- Audio Setup ---
let audioCtx, analyser, dataArray, timeArray;
let running = false;

document.getElementById('start-btn').addEventListener('click', async () => {
  if (running) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 4096; // higher resolution
  analyser.smoothingTimeConstant = 0.92; // smooth visuals
  source.connect(analyser);
  dataArray = new Float32Array(analyser.frequencyBinCount);
  timeArray = new Uint8Array(analyser.fftSize);
  running = true;
});

// --- Mode Management ---
let mode = 0;
const MODE_NAMES = ['LISSAJOUS', 'MANDALA'];
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = parseInt(btn.dataset.mode);
    document.getElementById('mode-name').textContent = MODE_NAMES[mode];
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// --- Audio Smoothing ---
let sm = 0.2;
let sRMS = 0, sBass = 0, sLowMid = 0, sMid = 0, sHighMid = 0, sTreble = 0;

// Helper: band energy
function bandEnergy(freqData, sr, fLow, fHigh) {
  let sum = 0, count = 0;
  const binSize = sr / freqData.length;
  for (let i = Math.floor(fLow/binSize); i < Math.min(freqData.length, Math.floor(fHigh/binSize)); i++) {
    sum += freqData[i];
    count++;
  }
  return count ? sum / count : 0;
}

// --- Visualization Helpers ---
function hsl(h, s, l, a=1) { return `hsla(${h},${s}%,${l}%,${a})`; }

// --- Lissajous Mode ---
const LISS_HISTORY = 2000;
let lissPoints = [];

function drawLissajous(x0, y0, w, h, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Compute X/Y frequency ratios
  const freqRatioA = 4 + sBass * 4;
  const freqRatioB = 5 + sHighMid * 3;
  const phaseShift = performance.now()*0.0002 + sMid * Math.PI*2;
  // Add new point
  const t = performance.now()*0.002;
  const px = x0 + Math.sin(t*freqRatioA + phaseShift) * w/4;
  const py = y0 + Math.sin(t*freqRatioB) * h/4;
  lissPoints.push({px, py});
  if(lissPoints.length > LISS_HISTORY) lissPoints.shift();
  // Draw trail
  ctx.beginPath();
  for(let i=0; i<lissPoints.length; i++){
    const p = lissPoints[i];
    ctx.lineTo(p.px, p.py);
  }
  ctx.strokeStyle = hsl((t*20)%360,90,65,0.7);
  ctx.lineWidth = 2 + sRMS*4;
  ctx.shadowBlur = 15 + sRMS*30;
  ctx.shadowColor = hsl((t*20)%360,100,70);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// --- Mandala Mode ---
function drawMandala(x0, y0, w, h, alpha=1) {
  const rings = 3;
  const baseR = Math.min(w,h)/4;
  const petals = Math.round(6 + sTreble*2);
  const rotSpeed = 0.01 + sMid*0.02;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x0, y0);
  for(let r=0;r<rings;r++){
    const ringR = baseR*(0.5 + r*0.3);
    for(let i=0;i<petals;i++){
      const angle = (i/petals)*2*Math.PI + performance.now()*0.001*rotSpeed;
      const bandVal = Math.random()*0.5 + 0.5;
      const petalLen = ringR*(0.9 + bandVal*1.2);
      const petalW   = ringR*(0.1 + sMid*0.15);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(
        petalW*Math.cos(angle-Math.PI/8), -petalW*Math.sin(angle-Math.PI/8),
        petalW*Math.cos(angle+Math.PI/8), -petalW*Math.sin(angle+Math.PI/8),
        petalLen*Math.cos(angle), -petalLen*Math.sin(angle)
      );
      ctx.strokeStyle = hsl((performance.now()*0.05)%360,90,65,0.8);
      ctx.lineWidth = 2 + sRMS*3;
      ctx.stroke();
    }
  }
  ctx.restore();
}

// --- Main Render Loop ---
function render(){
  requestAnimationFrame(render);
  ctx.fillStyle = `rgba(0,0,0,0.04)`; // slow fade
  ctx.fillRect(0,0,W,H);

  if(running && analyser){
    analyser.getFloatFrequencyData(dataArray);
    analyser.getByteTimeDomainData(timeArray);

    const sr = audioCtx.sampleRate;
    const bass    = bandEnergy(dataArray, sr, 80, 250);
    const lowmid  = bandEnergy(dataArray, sr, 250, 800);
    const mid     = bandEnergy(dataArray, sr, 800, 2500);
    const highmid = bandEnergy(dataArray, sr, 2500, 6000);
    const treble  = bandEnergy(dataArray, sr, 6000, 10000);
    // Smooth
    sRMS     = sRMS     * (1-sm) + Math.random()*1*sm*5;
    sBass    = sBass    * (1-sm) + bass*sm*6;
    sLowMid  = sLowMid  * (1-sm) + lowmid*sm*3;
    sMid     = sMid     * (1-sm) + mid*sm*3;
    sHighMid = sHighMid * (1-sm) + highmid*sm*3;
    sTreble  = sTreble  * (1-sm) + treble*sm*3;
  }

  const cx = W/2, cy = H/2;
  if(mode===0) drawLissajous(cx, cy, W, H);
  else if(mode===1) drawMandala(cx, cy, W, H);
}

render();
</script>

</body>
</html>
